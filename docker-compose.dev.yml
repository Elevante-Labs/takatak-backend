version: '3.9'

# Development-only services (no app container — run app locally with npm run dev)
services:
  postgres:
    image: postgres:16-alpine
    container_name: takatak-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: takatak
      POSTGRES_PASSWORD: takatak_secret
      POSTGRES_DB: takatak
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: takatak-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes

volumes:
  postgres_dev_data:
    driver: local
